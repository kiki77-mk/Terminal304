<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        window.Telegram.WebApp.expand();
    </script>
    <title>TERMINAL ٣٠٤</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: #00f2ff; }
        #intro-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; padding: 30px; text-align: center; }
        .intro-logo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #00f2ff; margin-bottom: 20px; object-fit: cover; }
        #typewriter { font-size: 17px; line-height: 1.6; max-width: 500px; min-height: 120px; font-family: 'Courier New', monospace; text-shadow: 0 0 10px #00f2ff; }
        .options { display: none; gap: 20px; margin-top: 30px; }
        .opt-btn { background: transparent; border: 1px solid #00f2ff; color: #00f2ff; padding: 12px 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .opt-btn:hover { background: #00f2ff; color: #000; }
        #splash { display: none; position: fixed; inset: 0; background: #000; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .logo-load { font-size: 80px; text-shadow: 0 0 20px #00f2ff; }
        .barre-ext { width: 200px; height: 4px; background: #111; margin-top: 20px; }
        .barre-int { width: 0%; height: 100%; background: #00f2ff; box-shadow: 0 0 10px #00f2ff; }
        #main-chat { display: none; height: 100%; flex-direction: column; background: url('https://i.ibb.co/TqTqjQd8/1000236508.jpg') no-repeat center center; background-size: cover; }
        .overlay { position: absolute; inset: 0; background: rgba(0, 5, 10, 0.75); }
        header { position: relative; z-index: 10; background: #17212b; padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid #00f2ff33; }
        .header-logo { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #00f2ff; margin-right: 12px; }
        #chat-zone { position: relative; z-index: 10; flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 15px; margin-bottom: 10px; color: #fff; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .received { background: #182533; border: 1px solid #2b5278; align-self: flex-start; }
        .sent { background: #2b5278; align-self: flex-end; }
        .input-box { position: relative; z-index: 10; background: #17212b; padding: 15px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: #242f3d; border: 1px solid #00f2ff33; padding: 12px; border-radius: 20px; color: #fff; outline: none; }
        .btn-action { background: #00f2ff; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; color: #000; }
        .spec-container { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; width: 100%; }
        .spec-btn { background: #242f3d; border: 1px solid #00f2ff88; color: #fff; padding: 10px; border-radius: 10px; text-align: left; cursor: pointer; }
        .spec-btn:hover { background: #00f2ff; color: #000; }
        #scanner-container { display: none; position: fixed; top: 15%; left: 5%; width: 90%; background: #111; border: 2px solid #00f2ff; z-index: 150; border-radius: 15px; padding: 10px; box-shadow: 0 0 30px #00f2ff55; }
        #camera-view { width: 100%; height: 250px; background: #000; border-radius: 10px; overflow: hidden; }
        .close-scan-btn { background: #ff3b30; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; margin-top: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="scanner-container">
        <div style="font-size:12px; text-align:center; margin-bottom:8px; letter-spacing:1px;">ANALYSE OPTIQUE EN COURS...</div>
        <div id="camera-view"></div>
        <button class="close-scan-btn" onclick="stopScanner()">ANNULER LE SCAN</button>
    </div>
    <div id="intro-screen">
        <img src="https://i.ibb.co/TqTqjQd8/1000236508.jpg" class="intro-logo">
        <div id="typewriter"></div>
        <div class="options" id="options">
            <button class="opt-btn" onclick="startSequence('yes')">J'ACCEPTE</button>
            <button class="opt-btn" onclick="startSequence('no')">REFUSER</button>
        </div>
    </div>
    <div id="splash">
        <div class="logo-load">٣٠٤</div>
        <div style="font-size:10px; letter-spacing:2px;">CRYPTAGE DU CANAL...</div>
        <div class="barre-ext"><div class="barre-int" id="progress"></div></div>
    </div>
    <div id="main-chat">
        <div class="overlay"></div>
        <header>
            <img src="https://i.ibb.co/TqTqjQd8/1000236508.jpg" class="header-logo">
            <div>
                <div style="color:white; font-weight:bold; font-size:14px;">CONSEIL DES LOUPS NOIRS</div>
                <div style="color:#00f2ff; font-size:11px;">Liaison Directe : Infiltration Active</div>
            </div>
        </header>
        <div id="chat-zone"></div>
        <div class="input-box">
            <label for="fileInput" class="btn-action">📎</label>
            <input type="file" id="fileInput" onchange="sendFile()" style="display:none;">
            <button class="btn-action" style="background:#242f3d; color:#00f2ff; border:1px solid #00f2ff44;" onclick="startScanner()">📷</button>
            <input type="text" id="msgInput" placeholder="Initialisation...">
            <button class="btn-action" onclick="handleInput()">➤</button>
        </div>
    </div>
    <script>
        // ==========================================
        // CONFIGURATION : METS TES INFOS ICI
        // ==========================================
        const token = "8046059525:AAFrSHypQabW1HSbZaZTGNhZ3qr_Ym06F4o";
        const myId = "6633017977";
        // ==========================================

        let tgUser = window.Telegram.WebApp.initDataUnsafe?.user || { id: "Inconnu", username: "Anonyme" };
        let playerProfile = { telegramId: tgUser.id, username: tgUser.username, codeName: "", specialty: "" };
        let currentStep = 0; let lastMsgId = 0; let html5QrcodeScanner = null;
        const introText = "Transmission cryptée interceptée.\n\nLe Conseil du Clan des Loups Noirs a détecté votre signal.\n\nNous recherchons des profils d'exception. Souhaitez-vous rejoindre nos rangs ?";
        let i = 0;
        function typeWriter() {
            if (i < introText.length) {
                let char = introText.charAt(i);
                document.getElementById("typewriter").innerHTML += char === "\n" ? "<br>" : char;
                i++; setTimeout(typeWriter, 40);
            } else { document.getElementById("options").style.display = "flex"; }
        }
        window.onload = typeWriter;
        function startSequence(choice) {
            if(choice === 'no') {
                document.getElementById("typewriter").innerHTML = "Signal rompu...";
                document.getElementById("options").style.display = "none"; return;
            }
            document.getElementById("intro-screen").style.display = "none";
            document.getElementById("splash").style.display = "flex";
            let prog = 0;
            let interval = setInterval(() => {
                prog += 4; document.getElementById("progress").style.width = prog + "%";
                if(prog >= 100) {
                    clearInterval(interval);
                    document.getElementById("splash").style.display = "none";
                    document.getElementById("main-chat").style.display = "flex";
                    addBubble("Canal sécurisé. Avant toute chose, le Conseil doit vous identifier.", "received");
                    setTimeout(() => {
                        addBubble("Choisissez et entrez votre NOM DE CODE :", "received");
                        document.getElementById('msgInput').placeholder = "Ex: Shadow...";
                    }, 1000);
                }
            }, 50);
        }
        function addBubble(text, type) {
            const zone = document.getElementById('chat-zone'); const b = document.createElement('div');
            if (type === "received_html") { b.className = "bubble received"; b.innerHTML = text; }
            else { b.className = "bubble " + type; b.innerText = text; }
            zone.appendChild(b); zone.scrollTop = zone.scrollHeight;
        }
        function handleInput() {
            const val = document.getElementById('msgInput').value.trim(); if(!val) return;
            if (currentStep === 0) {
                playerProfile.codeName = val; addBubble(val, "sent");
                document.getElementById('msgInput').value = ""; document.getElementById('msgInput').disabled = true;
                setTimeout(() => {
                    addBubble(`Nom de code "${playerProfile.codeName}" enregistré.`, "received");
                    currentStep = 1; showSpecialtyOptions();
                }, 1200);
            } else if (currentStep === 2) {
                addBubble(val, "sent"); sendTelegramMessage(`[Agent: ${playerProfile.codeName}] : ${val}`);
                document.getElementById('msgInput').value = "";
            }
        }
        function showSpecialtyOptions() {
            setTimeout(() => {
                const htmlChoices = `Sélectionnez votre spécialité :
                    <div class="spec-container">
                        <button class="spec-btn" onclick="selectSpecialty('Infiltration')">⚡ Infiltration / Terrain</button>
                        <button class="spec-btn" onclick="selectSpecialty('Renseignement')">👁️ Renseignement / Analyse</button>
                        <button class="spec-btn" onclick="selectSpecialty('Cyber')">💻 Guerre Électronique</button>
                    </div>`;
                addBubble(htmlChoices, "received_html");
            }, 1000);
        }
        function selectSpecialty(spec) {
            playerProfile.specialty = spec; addBubble(`Spécialité : ${spec}`, "sent");
            document.querySelectorAll('.spec-container').forEach(c => c.style.display = 'none');
            setTimeout(() => {
                addBubble("Création du dossier...", "received");
                sendTelegramMessage(`🚨 NOUVELLE RECRUE 🚨\n• Code : ${playerProfile.codeName}\n• Spécialité : ${playerProfile.specialty}\n• User : @${playerProfile.username}\n• ID : ${playerProfile.telegramId}`);
                setTimeout(() => {
                    addBubble(`Bienvenue Agent ${playerProfile.codeName}.`, "received");
                    setTimeout(() => {
                        addBubble("🎯 MISSION 001 :\nLocalisez la balise et scannez son code d'activation via l'icône 📷.", "received");
                        document.getElementById('msgInput').disabled = false; currentStep = 2;
                    }, 1500);
                }, 1500);
            }, 1000);
        }
        function startScanner() {
            document.getElementById('scanner-container').style.display = 'block';
            html5QrcodeScanner = new Html5Qrcode("camera-view");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, { fps: 10, qrbox: { width: 180, height: 180 } },
                (qrCodeMessage) => { stopScanner(); processQRData(qrCodeMessage); },
                (errorMessage) => {}
            ).catch((err) => {
                stopScanner();
                let secours = prompt("⚠️ PROTOCOLE DE SECOURS\nSaisissez le code secret de la balise :");
                if(secours) processQRData(secours);
            });
        }
        function stopScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => { document.getElementById('scanner-container').style.display = 'none'; })
                .catch(() => { document.getElementById('scanner-container').style.display = 'none'; });
            } else { document.getElementById('scanner-container').style.display = 'none'; }
        }
        function processQRData(code) {
            addBubble("[Analyse...] Code : " + code, "sent");
            setTimeout(() => {
                if(code.toLowerCase().includes("loup_mission1") || code.includes("validation")) {
                    addBubble("🔑 [SYSTÈME] : MISSION 001 VALIDÉE. Attente de la Mission 002...", "received_html");
                    sendTelegramMessage(`✅ MISSION 1 REUSSIE par ${playerProfile.codeName}. Code : ${code}`);
                } else { addBubble("❌ [ÉCHEC] : Code inconnu.", "received"); }
            }, 1500);
        }
        function sendTelegramMessage(text) {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${myId}&text=${encodeURIComponent(text)}`);
        }
        async function sendFile() {
            if (currentStep < 2) return; const fileEl = document.getElementById('fileInput'); if (fileEl.files.length === 0) return;
            const file = fileEl.files[0]; const formData = new FormData(); formData.append('chat_id', myId);
            let method = file.type.startsWith('image/') ? "sendPhoto" : file.type.startsWith('video/') ? "sendVideo" : "sendDocument";
            formData.append(method === "sendPhoto" ? "photo" : method === "sendVideo" ? "video" : "document", file);
            addBubble(`Envoi fichier : ` + file.name, "sent");
            await fetch(`https://api.telegram.org/bot${token}/${method}`, { method: 'POST', body: formData }); fileEl.value = "";
        }
        async function checkMessages() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${token}/getUpdates?offset=-1`); const data = await response.json();
                if (data.result && data.result.length > 0) {
                    const msg = data.result[0].message;
                    if (msg && msg.message_id !== lastMsgId && msg.chat.id.toString() === myId) {
                        lastMsgId = msg.message_id; addBubble(msg.text || "[Ordre Reçu]", "received");
                    }
                }
            } catch (e) {} setTimeout(checkMessages, 2500);
        }
        checkMessages();
    </script>
</body>
    </html>
